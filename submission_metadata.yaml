# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Windows 11 laptop"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.11.9"
  os: "Windows 11"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: true          # neural embeddings are precomputed once
  pre_computation_time_minutes: 20        # approx; update to your measured time

# ============================================================================
# AI tools declaration (transparency only; honest declaration is not penalised)
# ============================================================================
ai_tools_used:
  - "GitHub Copilot"
ai_usage_summary: |
  Used an AI coding assistant (GitHub Copilot CLI) for pair-programming:
  scaffolding scripts, code review, and explaining concepts. All scoring
  logic and weight-tuning methodology were designed and verified by the team.
  No candidate data was sent to any hosted LLM, and the ranking code makes
  no network calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid feature-based ranker (no per-candidate LLM calls; CPU-only; ~1 min).
  FINAL = FIT(0-100) x AVAILABILITY(0-1), with impossible profiles (honeypots)
  forced to 0. FIT combines a neural meaning-match (bge-small embeddings,
  precomputed offline) with trust-weighted real-skills depth (endorsements x
  months x assessment), current-title fit, experience-band fit, product-vs-
  services company, and location. AVAILABILITY multiplies down inactive /
  unresponsive / long-notice candidates. Weights were tuned with an offline
  evaluation framework (evaluate.py) against an independent gold-relevance
  judge on a held-out validation split, scored with NDCG@10/50, MAP, P@10.
  Honeypot and wrong-field guardrails confirmed clean on the top 100.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
